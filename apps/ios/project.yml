name: AutonomoAV
options:
  bundleIdPrefix: com.avalsys
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    DEVELOPMENT_LANGUAGE: en
    PRODUCT_NAME: AutonomoAV
    SWIFT_VERSION: "6.0"

packages:
  AccountAV:
    path: ../../../account-av
  AppsAV:
    path: ../../../apps-av/apple
  Clerk:
    url: https://github.com/clerk/clerk-ios
    from: 1.0.0

schemes:
  AutonomoAV:
    build:
      targets:
        AutonomoAV: all
        AutonomoAVShareExtension: all
    run:
      config: Debug
      executable: AutonomoAV
    test:
      config: Debug
      targets:
        - AutonomoAVTests
    analyze:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
    management:
      shared: true

targets:
  AutonomoAV:
    type: application
    platform: iOS
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    sources:
      - path: AutonomoAV
    dependencies:
      - package: AccountAV
        product: AccountAV
      - package: AppsAV
        product: AVProductAccountFoundation
      - package: AppsAV
        product: AVBrandFoundation
      - package: AppsAV
        product: AVAppShellFoundation
      - package: AppsAV
        product: AVSettingsFoundation
      - package: AppsAV
        product: AVHaptics
      - package: Clerk
        product: ClerkKit
      - target: AutonomoAVShareExtension
        embed: true
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: AutonomoAV/App/AutonomoAV.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "$(AVALSYS_APPLE_DEVELOPMENT_TEAM)"
        FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]: "$(SDKROOT)/Developer/Library/Frameworks"
        INFOPLIST_FILE: AutonomoAV/App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        SKIP_INSTALL: NO
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
      configs:
        Debug:
          CODE_SIGN_IDENTITY: Apple Development
        Release:
          CODE_SIGN_IDENTITY: Apple Development

  AutonomoAVShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    sources:
      - path: AutonomoAVShareExtension
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_ENTITLEMENTS: AutonomoAVShareExtension/AutonomoAVShareExtension.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "$(AVALSYS_APPLE_DEVELOPMENT_TEAM)"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: AutonomoAVShareExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: "$(PRODUCT_BUNDLE_IDENTIFIER).share"
        PRODUCT_NAME: "Enviar a Autonomo AV Inbox"
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: Apple Development
        Release:
          CODE_SIGN_IDENTITY: Apple Development

  AutonomoAVTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AutonomoAVTests
    dependencies:
      - target: AutonomoAV
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: AutonomoAVTests
        PRODUCT_BUNDLE_IDENTIFIER: "$(AUTONOMOAV_BUNDLE_IDENTIFIER).tests"
        TARGETED_DEVICE_FAMILY: "1"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AutonomoAV.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AutonomoAV"
