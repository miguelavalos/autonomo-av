name: iOS CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ios-ci.yml"
      - "apps/ios/**"
      - "docs/ios-bootstrap-notes.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ios-ci.yml"
      - "apps/ios/**"
      - "docs/ios-bootstrap-notes.md"

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ios:
    name: Build iOS
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout Autonomo AV
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Checkout Account AV
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: miguelavalos/account-av
          path: account-av

      - name: Checkout Apps AV
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: miguelavalos/apps-av
          path: apps-av

      - name: Link local packages
        run: |
          set -euo pipefail
          ln -s "$GITHUB_WORKSPACE/account-av" "$GITHUB_WORKSPACE/../account-av"
          ln -s "$GITHUB_WORKSPACE/apps-av" "$GITHUB_WORKSPACE/../apps-av"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Validate dev runtime config
        run: apps/ios/scripts/check-ios-runtime-config.sh --env dev --configuration Debug

      - name: Build iOS app
        working-directory: apps/ios
        run: |
          xcodebuild \
            -project AutonomoAV.xcodeproj \
            -scheme AutonomoAV \
            -destination 'generic/platform=iOS Simulator' \
            build \
            CODE_SIGNING_ALLOWED=NO
