name: iOS CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/ios-ci.yml"
      - "AGENTS.md"
      - "apps/ios/**"
      - "docs/ios-bootstrap-notes.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ios-ci.yml"
      - "AGENTS.md"
      - "apps/ios/**"
      - "docs/ios-bootstrap-notes.md"

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ios:
    name: Build and test iOS
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout Autonomo AV
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Checkout Account AV
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: miguelavalos/account-av
          path: account-av

      - name: Checkout Apps AV
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: miguelavalos/apps-av
          path: apps-av

      - name: Link local packages
        run: |
          set -euo pipefail
          ln -s "$GITHUB_WORKSPACE/account-av" "$GITHUB_WORKSPACE/../account-av"
          ln -s "$GITHUB_WORKSPACE/apps-av" "$GITHUB_WORKSPACE/../apps-av"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Validate dev runtime and share extension preflight
        run: apps/ios/scripts/check-ios-release-preflight.sh --env dev --configuration Debug --skip-build

      - name: Build and test iOS app
        working-directory: apps/ios
        run: |
          set -euo pipefail
          simulator_id="$(xcrun simctl list devices available -j | jq -r '[.devices[][] | select(.isAvailable and (.name | startswith("iPhone")))][0].udid // empty')"
          if [ -z "$simulator_id" ]; then
            echo "No available iPhone simulator was found." >&2
            exit 1
          fi
          mkdir -p ../../.derived-data/ios-ci/TestResults
          xcodebuild \
            -project AutonomoAV.xcodeproj \
            -scheme AutonomoAV \
            -destination "platform=iOS Simulator,id=$simulator_id" \
            -derivedDataPath ../../.derived-data/ios-ci \
            -resultBundlePath ../../.derived-data/ios-ci/TestResults/AutonomoAV.xcresult \
            test \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS test result bundle
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ios-ci-xcresult
          path: .derived-data/ios-ci/TestResults/AutonomoAV.xcresult
          if-no-files-found: ignore
          retention-days: 7
