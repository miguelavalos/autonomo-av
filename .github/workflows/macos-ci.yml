name: macOS CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/macos-ci.yml"
      - "AGENTS.md"
      - "README.md"
      - "scripts/macos-ci-test.sh"
      - "apps/macos/**"
      - "apps/ios/AutonomoAV/Account/**"
      - "apps/ios/AutonomoAV/Network/**"
      - "apps/ios/AutonomoAV/Resources/**"
      - "shared/apple/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/macos-ci.yml"
      - "AGENTS.md"
      - "README.md"
      - "scripts/macos-ci-test.sh"
      - "apps/macos/**"
      - "apps/ios/AutonomoAV/Account/**"
      - "apps/ios/AutonomoAV/Network/**"
      - "apps/ios/AutonomoAV/Resources/**"
      - "shared/apple/**"

concurrency:
  group: macos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  macos:
    name: Build and test macOS
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout Autonomo AV
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Checkout Account AV
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: miguelavalos/account-av
          path: account-av

      - name: Checkout Apps AV
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: miguelavalos/apps-av
          path: apps-av

      - name: Link local packages
        run: |
          set -euo pipefail
          ln -s "$GITHUB_WORKSPACE/account-av" "$GITHUB_WORKSPACE/../account-av"
          ln -s "$GITHUB_WORKSPACE/apps-av" "$GITHUB_WORKSPACE/../apps-av"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build and test macOS app
        run: scripts/macos-ci-test.sh

      - name: Upload macOS test result bundle
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: macos-ci-xcresult
          path: .derived-data/macos-ci/TestResults/AutonomoAVMac.xcresult
          if-no-files-found: ignore
          retention-days: 7
